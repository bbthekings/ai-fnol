name: "Destroy Dev Infrastructure (Freeze All Costs)"

on:
  workflow_dispatch: # Manual trigger only

permissions:
  id-token: write
  contents: read

jobs:
  # job 1  
  destroy:
    runs-on: ubuntu-latest
    steps:
      # step 1
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # checkout step
      - name: Checkout Code
        uses: actions/checkout@v4

      # step 2 
      - name: Read resource group name from parameters
        id: params
        run: |
            RG_NAME=$(jq -r '.parameters.rgname.value' ./iac/env/dev/main.parameters.json)
            echo "rg_name=$RG_NAME" >> $GITHUB_OUTPUT
      # step 3
      - name: Delete and Purge Resources
        run: |
          # 1. Install the ML extension first
          echo "Installing Azure ML extension..."
          az extension add --name ml --yes

          # 2. Get the RG name from the previous step
          RG_NAME="${{ steps.params.outputs.rg_name }}"
          # Check if the Resource Group exists
          EXISTS=$(az group exists --name "$RG_NAME")
            if [ "$EXISTS" == "true" ]; then
              echo "Resource Group $RG_NAME found. Starting deletion..."
              az group delete --name "$RG_NAME" --yes --no-wait
            else
              echo "Resource Group $RG_NAME does not exist. Skipping deletion."
            fi      

          # 3. Purge Deleted Key Vaults (Global loop)
          echo "Searching for all soft-deleted Key Vaults..."
          DELETED_VAULTS=$(az keyvault list-deleted --query "[].name" -o tsv)
          for vault in $DELETED_VAULTS; do
              echo "Purging Key Vault: $vault"
              az keyvault purge --name "$vault" --no-wait || echo "Already purging $vault"
          done

          # Purge Deleted AML Workspaces
          # 1. Get Subscription ID and Location
          SUBSCRIPTION_ID=$(az account show --query id -o tsv)
          # We pick the location from your RG or a default one you're using
          LOCATION="germanywestcentral" 

          # 2. Use the Location-specific "deletedWorkspaces" path
          # This is often more reliable than the global provider path
          DELETED_WS=$(az rest --method get \
              --uri "/subscriptions/$SUBSCRIPTION_ID/providers/Microsoft.MachineLearningServices/locations/$LOCATION/deletedWorkspaces?api-version=2024-04-01" \
              --query "value[].name" -o tsv)

          for ws in $DELETED_WS; do
              echo "Purging AML Workspace: $ws"
              az rest --method delete \
                  --uri "/subscriptions/$SUBSCRIPTION_ID/providers/Microsoft.MachineLearningServices/locations/$LOCATION/deletedWorkspaces/$ws?api-version=2024-04-01" \
                  --verbose || echo "Skip $ws"
          done
