#######################################################
# wf name
#######################################################
name: 'Deploy [Dev] Pilot Infrastructure' 

#######################################################
# branch
# Trigger only when code is pushed to the main branch
#######################################################
on:
  push:
    branches:
      - main  
    paths:
      - 'iac/**'
  workflow_dispatch:

#######################################################
# GitHub Actions request an OIDC token from GitHub 
# and exchange it for Azure access. The workflow must 
# have "id-token: write" to fetch that token
#######################################################
permissions:
  id-token: write
  contents: read
    
#######################################################
# all jobs
#######################################################
jobs:
  ######
  # job 1: 'deploy-infra'
  deploy-infra:
    runs-on: ubuntu-latest
    ###################################################
    # all steps
    ###################################################
    steps:
      #########
      # step 1. Checkout the code from your repo
      - name: Checkout Code
        uses: actions/checkout@v4

      #########
      # step 2. Login to Azure using GitHub OIDC federation
      # this is OIDC-style login pattern
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      #########
      # step 3. Deploy the Bicep file
      - name: Deploy Dev Main Bicep
        id: dev_main_bicep
        uses: azure/arm-deploy@v2
        with:
          scope: subscription # Match the Bicep targetScope
          region: germanywestcentral
          template: ./iac/env/dev/main.bicep
          parameters: ./iac/env/dev/main.parameters.json
          deploymentName: deploy-dev-infra # just a readable name for the Azure deployment operation
          failOnStdErr: false # because warnings are being written to stderr if failOnStdErr: true
      #########
      # Fix F2026.04.13.20.15.00: AksToAcr access-badge: created on top of the ACR resource
      #########
      - name: Assign AcrPull to AKS Kubelet Identity
        run: |
          rg_name=$(jq -r '.parameters.rgname.value' ./iac/env/dev/main.parameters.json)
          acr_name=$(jq -r '.parameters.acrName.value' ./iac/env/dev/main.parameters.json)
          aks_name=$(jq -r '.parameters.aksFnolPilotName.value' ./iac/env/dev/main.parameters.json)
          
          # 1. Get IDs
          ACR_ID=$(az acr show --name "$acr_name" --resource-group "$rg_name" --query id -o tsv)
          KUBELET_ID=$(az aks show --name "$aks_name" --resource-group "$rg_name" --query identityProfile.kubeletidentity.objectId -o tsv)

          # 2. Check if the assignment already exists to prevent workflow errors
          ASSIGNMENT_EXISTS=$(az role assignment list --assignee "$KUBELET_ID" --scope "$ACR_ID" --role AcrPull --query "[].id" -o tsv)

          if [ -z "$ASSIGNMENT_EXISTS" ]; then
            echo "Assigning AcrPull role to Kubelet identity..."
            az role assignment create \
              --assignee-object-id "$KUBELET_ID" \
              --assignee-principal-type ServicePrincipal \
              --role AcrPull \
              --scope "$ACR_ID"
          else
            echo "AcrPull role already assigned. Skipping."
          fi            
      #########  
      - name: Assign Storage Blob Data Contributor to AML workspace identity
        run: |
          rg_name=$(jq -r '.parameters.rgname.value' ./iac/env/dev/main.parameters.json)
          aml_name=$(jq -r '.parameters.amlWorkspaceName.value' ./iac/env/dev/main.parameters.json)
          st_name=$(jq -r '.parameters.stFnolPilotName.value' ./iac/env/dev/main.parameters.json)

          AML_PRINCIPAL_ID=$(az ml workspace show \
            --name "$aml_name" \
            --resource-group "$rg_name" \
            --query identity.principal_id -o tsv)

          STORAGE_ID=$(az storage account show \
            --name "$st_name" \
            --resource-group "$rg_name" \
            --query id -o tsv)

          ASSIGNMENT_EXISTS=$(az role assignment list \
            --assignee "$AML_PRINCIPAL_ID" \
            --scope "$STORAGE_ID" \
            --role "Storage Blob Data Contributor" \
            --query "[].id" -o tsv)

          if [ -z "$ASSIGNMENT_EXISTS" ]; then
            echo "Assigning Storage Blob Data Contributor to AML workspace identity..."
            az role assignment create \
              --assignee-object-id "$AML_PRINCIPAL_ID" \
              --assignee-principal-type ServicePrincipal \
              --role "Storage Blob Data Contributor" \
              --scope "$STORAGE_ID"
          else
            echo "Storage role already assigned. Skipping."
          fi